name: Mobile · iOS Beta

on:
  workflow_dispatch:
  push:
    tags:
      - 'mobile-ios-v*'

permissions:
  contents: read

jobs:
  ios-beta:
    name: Build & Upload IPA to TestFlight
    runs-on: macos-14
    timeout-minutes: 90
    environment: mobile-release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: apps/mobile

      - name: Install JS dependencies
        working-directory: apps/mobile
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: apps/mobile/ios/Pods
          key: pods-${{ hashFiles('apps/mobile/ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install Pods
        working-directory: apps/mobile/ios
        run: bundle exec pod install --repo-update

      - name: Run Fastlane iOS beta
        working-directory: apps/mobile
        run: bundle exec fastlane ios beta
        env:
          APPLE_BUNDLE_ID: ${{ vars.APPLE_BUNDLE_ID || 'tech.tunasoft.nettapu' }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          TESTFLIGHT_CHANGELOG: |
            Profesyonel mobil deneyim ve performans iyileştirmeleri.
            - Marka tutarlılığı (olive & şampanya altın)
            - Yeni Mesajlaşma (Inbox) modülü
            - Karanlık mod tutarlılığı

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: nettapu-ios-ipa
          path: apps/mobile/build/ios/NetTapu.ipa
          retention-days: 14
